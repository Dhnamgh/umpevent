<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quản lý sự kiện UMP</title>

  <meta name="robots" content="noindex, noarchive" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #fff;
      overflow: hidden;
    }

    header {
      height: 44px;
      background: #0f4c81;
      color: #fff;
      display: flex;
      align-items: center;
      padding-left: 14px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .2px;
      box-sizing: border-box;
    }

    .wrap {
      position: relative;
      height: calc(100% - 44px);
      overflow: hidden;
      background: #fff;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    /* Che khu vực góc dưới phải thường có nút điều khiển/toolbar của Streamlit */
    .bottom-shield {
      position: fixed;
      right: 0;
      bottom: 0;
      width: 360px;
      height: 180px;
      background: transparent;
      z-index: 999999;
      pointer-events: auto;
    }

    /* Che toàn bộ dải dưới nếu Streamlit hiển thị các nút ở cuối màn hình */
    .bottom-bar-shield {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100vw;
      height: 28px;
      background: transparent;
      z-index: 999998;
      pointer-events: auto;
    }

    @media (max-width: 600px) {
      header {
        height: 42px;
        font-size: 15px;
      }

      .wrap {
        height: calc(100% - 42px);
      }

      .bottom-shield {
        width: 100vw;
        height: 230px;
      }

      .bottom-bar-shield {
        height: 36px;
      }
    }
  </style>
</head>

<body>
  <header>📊 Quản lý sự kiện UMP</header>

  <div class="wrap">
    <iframe
      src="https://umpevent.streamlit.app/?embed=true&embed_options=show_toolbar=false"
      allow="clipboard-read; clipboard-write"
      referrerpolicy="no-referrer">
    </iframe>
  </div>

  <div class="bottom-shield" aria-hidden="true"></div>
  <div class="bottom-bar-shield" aria-hidden="true"></div>
</body>
</html>
